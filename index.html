<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayam's Pro Tracker & Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e2e8f0; border: 1px solid #e2e8f0; }
        .calendar-day { min-height: 100px; background: white; padding: 0.5rem; transition: all 0.2s; position: relative; overflow-y: auto; }
        .calendar-day:hover { background: #f8fafc; cursor: pointer; }
        .today-mark { background: #fffbeb !important; border: 2px solid #eab308 !important; }
        .holiday-tag { background: #fee2e2; color: #ef4444; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; font-weight: bold; margin-bottom: 2px; display: block; }
        .event-tag { background: #dbeafe; color: #2563eb; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; display: block; border-left: 3px solid #2563eb; }
        .animate-pop { animation: zoom 0.3s ease-out; }
        @keyframes zoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<div class="flex h-screen overflow-hidden">
    <div class="w-3/4 flex flex-col p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-slate-800">Part-Time <span class="text-blue-600">Tracker</span></h1>
            <button id="cal-toggle-btn" onclick="toggleCalendar()" class="bg-blue-600 text-white px-6 py-3 rounded-full flex items-center gap-3 font-bold shadow-lg transition-all hover:scale-105 active:scale-95">
                <i data-lucide="calendar"></i> <span id="btn-text">OPEN CALENDAR</span>
            </button>
        </div>

        <div id="calendar-popup" class="hidden mb-8 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden animate-pop">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 id="month-display" class="text-2xl font-black text-slate-800">Month Year</h2>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-200 rounded-lg">‹ Prev</button>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-200 rounded-lg">Next ›</button>
                </div>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-7 text-center font-black text-slate-400 text-xs mb-2">
                    <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <input id="f-company" type="text" placeholder="Company Name" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-blue-400">
                <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 px-1">APPLIED DATE</label><input id="f-date" type="date" class="p-2 bg-slate-50 border rounded-xl"></div>
                <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 px-1">FOLLOW UP</label><input id="f-follow" type="date" class="p-2 bg-slate-50 border rounded-xl"></div>
                <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 px-1">INTERVIEW</label><input id="f-interview" type="datetime-local" class="p-2 bg-slate-50 border rounded-xl"></div>
            </div>
            <textarea id="f-notes" placeholder="Notes (Max 250 words)..." class="w-full p-4 bg-slate-50 border rounded-xl h-24 mb-4 outline-none focus:ring-2 ring-blue-400"></textarea>
            <button onclick="saveJob()" id="save-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all flex justify-center items-center gap-2">
                <i data-lucide="save"></i> SAVE TO FIREBASE
            </button>
        </div>

        <div id="job-list" class="space-y-4 pb-20"></div>
    </div>

    <div class="w-1/4 bg-white border-l p-6 flex flex-col">
        <div class="rounded-3xl overflow-hidden shadow-xl mb-6">
            <img src="https://i.postimg.cc/jjRfNrM3/63445777-1BCC-4A05-ACF6-7AAE2396A4E9.png" class="w-full object-cover">
        </div>
        <div class="p-4 bg-slate-50 rounded-2xl border text-center">
            <p class="text-xs font-bold text-slate-400">TOTAL APPS</p>
            <p id="stat-total" class="text-4xl font-black">0</p>
        </div>
        <a href="https://calendar.google.com/calendar/u/0/r" target="_blank" class="mt-auto block text-center p-3 text-sm font-bold text-blue-500 border border-blue-100 rounded-xl hover:bg-blue-50">🔗 Open Google Calendar</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1IkJhlE0Z6vqSjbGwkxPfT2udshsQCBc",
        authDomain: "jayam-personal-2026.firebaseapp.com",
        projectId: "jayam-personal-2026",
        storageBucket: "jayam-personal-2026.firebasestorage.app",
        messagingSenderId: "62160466692",
        appId: "1:62160466692:web:a2587dce772da5a6861651"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let viewDate = new Date();
    let events = [];

    lucide.createIcons();

    const IRISH_HOLIDAYS = {
        "1-1": "New Year's", "2-2": "St Brigid's", "3-17": "St Patrick's☘️", "4-6": "Easter Mon",
        "5-4": "May Day", "6-1": "June Bank Hol", "8-3": "Aug Bank Hol", "10-26": "Oct Bank Hol", "12-25": "Christmas", "12-26": "St Stephens"
    };

    window.toggleCalendar = () => {
        const cal = document.getElementById('calendar-popup');
        const btn = document.getElementById('cal-toggle-btn');
        const txt = document.getElementById('btn-text');
        
        if(cal.classList.contains('hidden')) {
            cal.classList.remove('hidden');
            btn.classList.replace('bg-blue-600', 'bg-red-500');
            txt.innerText = "CLOSE CALENDAR";
            renderCalendar();
        } else {
            cal.classList.add('hidden');
            btn.classList.replace('bg-red-500', 'bg-blue-600');
            txt.innerText = "OPEN CALENDAR";
        }
    };

    window.saveJob = async () => {
        const company = document.getElementById('f-company').value;
        if(!company) return alert("Enter Company Name");
        await addDoc(collection(db, "parttime"), {
            company, notes: document.getElementById('f-notes').value,
            appliedDate: document.getElementById('f-date').value,
            followUp: document.getElementById('f-follow').value,
            interview: document.getElementById('f-interview').value,
            status: 'Pending', createdAt: serverTimestamp()
        });
        ['f-company', 'f-date', 'f-follow', 'f-interview', 'f-notes'].forEach(id => document.getElementById(id).value = '');
    };

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('month-display').innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(viewDate);

        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-day bg-slate-50/50"></div>`;

        for(let d=1; d<=days; d++) {
            const dateStr = `${y}-${m+1}-${d}`;
            const isToday = new Date().toDateString() === new Date(y, m, d).toDateString();
            const hol = IRISH_HOLIDAYS[`${m+1}-${d}`];

            const dayDiv = document.createElement('div');
            dayDiv.className = `calendar-day ${isToday ? 'today-mark' : ''}`;
            dayDiv.innerHTML = `<span class="font-black text-slate-400 text-sm">${d}</span>`;
            if(hol) dayDiv.innerHTML += `<span class="holiday-tag">${hol}</span>`;
            
            // Render saved events for this day
            events.filter(e => e.date === dateStr).forEach(e => {
                dayDiv.innerHTML += `<span class="event-tag">${e.title}</span>`;
            });

            dayDiv.onclick = async () => {
                const title = prompt(`Add Event for ${dateStr}:`);
                if(title) {
                    await addDoc(collection(db, "schedules"), { title, date: dateStr, createdAt: serverTimestamp() });
                }
            };
            grid.appendChild(dayDiv);
        }
    }

    // LOAD EVERYTHING
    onSnapshot(query(collection(db, "parttime"), orderBy('createdAt', 'desc')), (snap) => {
        const list = document.getElementById('job-list');
        list.innerHTML = '';
        document.getElementById('stat-total').innerText = snap.size;
        snap.forEach(d => {
            const job = d.data();
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4 hover:border-blue-400 transition";
            div.innerHTML = `
                <div class="flex-1">
                    <h3 class="font-black text-lg text-slate-800">${job.company}</h3>
                    <div class="flex gap-4 text-[10px] font-bold text-slate-400 mt-1">
                        <span>📅 ${job.appliedDate || '--'}</span> <span>🔔 ${job.followUp || '--'}</span> <span>🎤 ${job.interview || '--'}</span>
                    </div>
                    <p class="text-sm text-slate-600 mt-2 bg-slate-50 p-2 rounded border border-dashed">${job.notes || ''}</p>
                </div>
                <div class="flex gap-2">
                    <select onchange="updateJob('${d.id}', this.value)" class="p-2 bg-slate-100 rounded-lg text-xs font-bold">
                        <option value="Pending" ${job.status==='Pending'?'selected':''}>Pending</option>
                        <option value="Hired" ${job.status==='Hired'?'selected':''}>✅ Hired</option>
                    </select>
                    <button onclick="deleteDoc(doc(db, 'parttime', '${d.id}'))" class="text-red-300 hover:text-red-500">✕</button>
                </div>`;
            list.appendChild(div);
        });
    });

    onSnapshot(collection(db, "schedules"), (snap) => {
        events = snap.docs.map(d => d.data());
        if(!document.getElementById('calendar-popup').classList.contains('hidden')) renderCalendar();
    });

    window.changeMonth = (n) => { viewDate.setMonth(viewDate.getMonth() + n); renderCalendar(); };
    window.updateJob = async (id, s) => await updateDoc(doc(db, "parttime", id), { status: s });
</script>
</body>
</html>
