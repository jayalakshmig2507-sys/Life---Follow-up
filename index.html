<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Sliding calendar panel */
.calendar-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 0;
  height: 100%;
  background-color: #111;
  color: white;
  overflow-x: hidden;
  transition: width 0.5s ease;
  z-index: 30;
  padding: 1rem;
}
.calendar-panel.open {
  width: 60%;
}
#calendar-tab {
  position: absolute;
  top: 40%;
  right: 0;
  background-color: #111;
  color: white;
  padding: 0.5rem 1rem;
  cursor: pointer;
  border-radius: 8px 0 0 8px;
  font-weight: bold;
  z-index: 40;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.calendar-cell {
  border: 1px solid #333;
  min-height: 80px;
  padding: 4px;
  position: relative;
}
.calendar-cell.holiday {
  background-color: #800000;
}
.calendar-cell .tasks {
  font-size: 0.75rem;
  margin-top: 2px;
}
</style>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Left Tabs & Content -->
  <div class="w-1/3 bg-white shadow-lg flex flex-col">
    <div class="flex flex-col">
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="part-time">Part-Time</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="full-time">Full-Time</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="personal-growth">Personal Growth</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="courses">Courses</button>
    </div>

    <!-- Left content area -->
    <div class="flex-1 overflow-y-auto p-4" id="content-area">
      <p class="text-gray-400 text-center italic">Select a tab to view tasks...</p>
    </div>

    <!-- Form to add/modify Part-Time tasks -->
    <div class="p-4 border-t bg-gray-50">
      <h2 class="font-bold mb-2">Add / Modify Task</h2>
      <input id="companyName" placeholder="Company Name" class="w-full mb-1 p-2 border rounded">
      <input id="jobDescription" placeholder="Job Description" class="w-full mb-1 p-2 border rounded">
      <input id="contactName" placeholder="Contact Name" class="w-full mb-1 p-2 border rounded">
      <input id="contactEmail" placeholder="Contact Email" class="w-full mb-1 p-2 border rounded">
      <input id="followUpDate" type="date" class="w-full mb-1 p-2 border rounded">
      <select id="status" class="w-full mb-1 p-2 border rounded">
        <option value="pending">Pending</option>
        <option value="done">Done</option>
      </select>
      <button id="saveTask" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Save Task</button>
    </div>
  </div>

  <!-- Right Side -->
  <div class="w-2/3 relative flex flex-col">
    <!-- Top Image -->
    <div class="p-4">
      <img src="https://i.postimg.cc/MnrX2g21/2da0fa98.png" alt="Life Tracker" class="w-3/4 mx-auto object-contain rounded-lg shadow-md">
    </div>

    <!-- Calendar Tab (small) -->
    <div id="calendar-tab">📅 Calendar</div>

    <!-- Sliding Calendar Panel -->
    <div id="calendar-panel" class="calendar-panel">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">March 2026 Calendar</h2>
        <button id="close-calendar" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Close</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC1IkJhlE0Z6vqSjbGwkxPfT2udshsQCBc",
  authDomain: "jayam-personal-2026.firebaseapp.com",
  projectId: "jayam-personal-2026",
  storageBucket: "jayam-personal-2026.firebasestorage.app",
  messagingSenderId: "62160466692",
  appId: "1:62160466692:web:a2587dce772da5a6861651",
  measurementId: "G-YX1KZYZFEL"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// State
let activeTab = "part-time";
let unsubscribe = null;
let tasksData = {};

// DOM
const tabButtons = document.querySelectorAll('.tab-btn');
const contentArea = document.getElementById('content-area');
const calendarPanel = document.getElementById('calendar-panel');
const calendarTab = document.getElementById('calendar-tab');
const closeCalendar = document.getElementById('close-calendar');
const calendarGrid = document.getElementById('calendar-grid');

// Form inputs
const companyName = document.getElementById('companyName');
const jobDescription = document.getElementById('jobDescription');
const contactName = document.getElementById('contactName');
const contactEmail = document.getElementById('contactEmail');
const followUpDate = document.getElementById('followUpDate');
const status = document.getElementById('status');
const saveTask = document.getElementById('saveTask');

// Irish holiday
const irishHolidays = ["2026-03-17"];

// Tab click
tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    tabButtons.forEach(b => b.classList.remove('bg-gray-200'));
    btn.classList.add('bg-gray-200');
    renderTasks();
  });
});

// Calendar toggle
calendarTab.addEventListener('click', () => calendarPanel.classList.add('open'));
closeCalendar.addEventListener('click', () => calendarPanel.classList.remove('open'));

// Save task
saveTask.addEventListener('click', async () => {
  if(!companyName.value || !followUpDate.value) return alert("Company name and follow-up date required!");
  try {
    await addDoc(collection(db, activeTab), {
      companyName: companyName.value,
      jobDescription: jobDescription.value,
      contactName: contactName.value,
      contactEmail: contactEmail.value,
      followUpDate: followUpDate.value,
      status: status.value,
      createdAt: serverTimestamp()
    });
    companyName.value = jobDescription.value = contactName.value = contactEmail.value = followUpDate.value = '';
    status.value = 'pending';
    console.log("Task saved successfully!");
  } catch(err) {
    console.error("Error saving task:", err);
  }
});

// Render tasks
function renderTasks() {
  if (unsubscribe) unsubscribe();
  const colRef = collection(db, activeTab);
  const q = query(colRef, orderBy("createdAt", "asc"));
  unsubscribe = onSnapshot(q, snapshot => {
    contentArea.innerHTML = "";
    tasksData = {};
    if(snapshot.empty) {
      contentArea.innerHTML = '<p class="text-gray-400 text-center">No tasks yet.</p>';
      generateCalendar();
      return;
    }
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const dateKey = data.followUpDate || "unknown";
      if(!tasksData[dateKey]) tasksData[dateKey] = [];
      tasksData[dateKey].push(data);

      // Left panel task
      const div = document.createElement('div');
      div.className = "p-3 bg-gray-50 border-l-4 border-indigo-500 rounded mb-2";
      div.innerHTML = `
        <div class="font-bold">${data.companyName}</div>
        <div class="text-sm">${data.jobDescription || ''}</div>
        <div class="text-sm">Contact: ${data.contactName || ''} | ${data.contactEmail || ''}</div>
        <div class="text-sm">Follow-up: ${data.followUpDate || ''}</div>
        <div class="text-xs text-gray-400">Status: ${data.status || 'pending'}</div>
      `;
      contentArea.appendChild(div);
    });
    generateCalendar();
  });
}

// Generate calendar grid
function generateCalendar() {
  const year = 2026, month = 2; // March
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1,0).getDate();

  calendarGrid.innerHTML = "";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    const cell = document.createElement('div');
    cell.className = "font-bold text-center";
    cell.textContent = d;
    calendarGrid.appendChild(cell);
  });

  for(let i=0;i<firstDay;i++) calendarGrid.appendChild(document.createElement('div'));

  for(let date=1; date<=lastDate; date++){
    const cellDate = `${year}-03-${String(date).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = "calendar-cell";
    if(irishHolidays.includes(cellDate)) cell.classList.add('holiday');
    cell.innerHTML = `<div>${date}</div><div class="tasks"></div>`;
    if(tasksData[cellDate]){
      const tasksDiv = cell.querySelector('.tasks');
      tasksData[cellDate].forEach(t => {
        const taskEl = document.createElement('div');
        taskEl.textContent = t.companyName;
        tasksDiv.appendChild(taskEl);
      });
    }
    calendarGrid.appendChild(cell);
  }
}

// Initial render
renderTasks();
</script>
</body>
</html>
