<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Sliding calendar panel */
.calendar-panel {
  transition: transform 0.3s ease-in-out;
  z-index: 20;
}
.calendar-panel.closed {
  transform: translateX(100%);
}
.calendar-panel.open {
  transform: translateX(0);
}
/* Calendar tab always visible */
#calendar-tab {
  writing-mode: vertical-rl;
  text-orientation: mixed;
}
</style>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Left Tabs & Content -->
  <div class="w-1/3 bg-white shadow-lg flex flex-col">
    <!-- Tabs -->
    <div class="flex flex-col">
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="part-time">Part-Time</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="full-time">Full-Time</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="personal-growth">Personal Growth</button>
      <button class="tab-btn py-3 px-4 border-b hover:bg-gray-100 text-left font-semibold" data-tab="courses">Courses</button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-4" id="content-area">
      <p class="text-gray-400 text-center italic">Select a tab to view tasks...</p>
    </div>
  </div>

  <!-- Right Side -->
  <div class="w-2/3 relative flex flex-col">
    <!-- Top Image -->
    <div class="p-4">
      <img src="https://i.postimg.cc/2da0fa98/2da0fa98.png" alt="Life Tracker" class="w-full rounded-lg shadow-md">
    </div>

    <!-- Small Calendar Tab -->
    <div id="calendar-tab" class="absolute top-32 right-0 bg-indigo-600 text-white px-3 py-2 rounded-l cursor-pointer shadow-lg">
      📅 Calendar
    </div>

    <!-- Sliding Calendar Panel -->
    <div id="calendar-panel" class="calendar-panel closed absolute top-0 right-0 w-2/3 h-full bg-white shadow-lg p-4 overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Calendar</h2>
        <button id="close-calendar" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Close</button>
      </div>
      <div class="flex space-x-2 mb-4">
        <button class="view-btn bg-indigo-500 text-white px-3 py-1 rounded">Monthly</button>
        <button class="view-btn bg-indigo-500 text-white px-3 py-1 rounded">Weekly</button>
        <button class="view-btn bg-indigo-500 text-white px-3 py-1 rounded">Daily</button>
      </div>
      <div id="calendar-tasks" class="space-y-2">
        <p class="text-gray-400">Tasks will appear here...</p>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC1IkJhlE0Z6vqSjbGwkxPfT2udshsQCBc",
  authDomain: "jayam-personal-2026.firebaseapp.com",
  projectId: "jayam-personal-2026",
  storageBucket: "jayam-personal-2026.firebasestorage.app",
  messagingSenderId: "62160466692",
  appId: "1:62160466692:web:a2587dce772da5a6861651",
  measurementId: "G-YX1KZYZFEL"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// State
let activeTab = "part-time";
let editTaskId = null;

// DOM
const tabButtons = document.querySelectorAll('.tab-btn');
const contentArea = document.getElementById('content-area');
const calendarPanel = document.getElementById('calendar-panel');
const calendarTab = document.getElementById('calendar-tab');
const closeCalendar = document.getElementById('close-calendar');
const calendarTasks = document.getElementById('calendar-tasks');

// Handle tab click
tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    tabButtons.forEach(b => b.classList.remove('bg-gray-200'));
    btn.classList.add('bg-gray-200');
    renderTasks();
  });
});

// Toggle Calendar
calendarTab.addEventListener('click', () => {
  calendarPanel.classList.remove('closed');
  calendarPanel.classList.add('open');
});
closeCalendar.addEventListener('click', () => {
  calendarPanel.classList.remove('open');
  calendarPanel.classList.add('closed');
});

// Render Tasks Real-time
let unsubscribe = null;
function renderTasks() {
  if (unsubscribe) unsubscribe();
  const colRef = collection(db, activeTab);
  const q = query(colRef, orderBy("createdAt", "asc"));
  unsubscribe = onSnapshot(q, snapshot => {
    contentArea.innerHTML = "";
    calendarTasks.innerHTML = "";
    if (snapshot.empty) {
      contentArea.innerHTML = '<p class="text-gray-400 text-center">No tasks yet.</p>';
      calendarTasks.innerHTML = '<p class="text-gray-400 text-center">No tasks yet.</p>';
      return;
    }

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      // Left-side task
      const div = document.createElement('div');
      div.className = "p-3 bg-gray-50 border-l-4 border-indigo-500 rounded mb-2 flex justify-between items-center";
      div.innerHTML = `
        <div>
          <div class="font-bold text-gray-800">${data.task || data.activity || data.courseName}</div>
          <div class="text-sm text-gray-500">${data.details || data.description || data.progress || ''}</div>
          <div class="text-xs text-gray-400">${data.date || ''} | ${data.time || ''} | Status: ${data.status || 'pending'}</div>
        </div>
      `;
      contentArea.appendChild(div);

      // Right-side calendar task
      const calDiv = div.cloneNode(true);
      calendarTasks.appendChild(calDiv);
    });
  });
}

// Initial render
renderTasks();

</script>
</body>
</html>
